<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>日治時期畫家解謎：南街殷賑</title>
    <style>
        /* === 新增：匯入 Google Fonts 手寫字體 === */
        /* === 新增：匯入 Google Fonts 思源宋體 === */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        /* === 新增：手寫信件專用樣式 === */
        .handwriting {
            /* 💡 核心修改：將字體切換為思源宋體 */
            font-family: 'Noto Serif TC', serif;
            font-size: 22px; 
            line-height: 1.8;
            letter-spacing: 2px;
            color: #2c1e14; 
        }
        :root { --ink: #2c3e50; --paper: #f4e4bc; --bg: #111; }
        /* 💡 核心修改：將網頁預設字體改為思源宋體 */
        body { margin: 0; background: var(--bg); color: white; font-family: 'Noto Serif TC', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 💡 新增：確保按鈕與輸入框也統一使用思源宋體 */
        button, input { font-family: 'Noto Serif TC', serif; }
        /* === 1. 起始頁面 === */
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 9999; transition: opacity 2s ease; text-align: center; }
        #start-screen h1 { font-size: 2.5em; letter-spacing: 5px; animation: pulse 2.5s infinite; font-weight: normal; }

        /* === 2. 場景與UI共用 === */
        .scene { display: none; width: 800px; height: 600px; background: #2c241b; position: relative; border: 4px solid #5d4037; box-shadow: 0 0 30px black; overflow: hidden; }
        .active-scene { display: block; }
        .close-btn { position: absolute; top: 10px; right: 10px; padding: 8px 15px; cursor: pointer; background: #e74c3c; border: none; color: white; font-weight: bold; z-index: 50;}

        /* === 3. 主房間背景與圖片物件 === */
        #main-room {
            background-image: url('./main.png');
            background-size: 800px 600px; /* 固定房間大小 */
            background-position: top left;          
            background-repeat: no-repeat;         
        } 

        .item { 
            position: absolute; 
            cursor: pointer; 
            transition: 0.3s; 
            /* 讓所有物件的背景圖，都強制維持跟房間一樣的 800x600 大小 */
            background-size: 800px 600px; 
            background-repeat: no-repeat;
        }
        
        .item:hover { 
            filter: drop-shadow(0 0 10px #f1c40f); 
            transform: scale(1.05); 
        }

        /* 
           【魔法座標設定】
           width / height：設定為玩家真正可以點擊的區域大小
           background-position：設定為負數的 (-left, -top) 來抵銷位移，讓圖片完美對齊房間
        */
        #item1 { top: 490px; left: 650px; width: 120px;  height: 100px;  background-image: url('toy.png'); background-position: -590px -470px; }
        #item2 { top: 495px; left: 0px; width: 175px; height: 125px;  background-image: url('news.png'); background-position: -15px -490px; }
        #item3 { top: 480px; left: 370px; width: 130px;  height: 90px;  background-image: url('book.png'); background-position: -371px -480px; }
        #item4 { top: 400px; left: 200px; width: 100px;  height: 100px;  background-image: url('letter.png'); background-position: -200px -400px; }
        #item5 { top: 100px;  left: 100px; width: 130px; height: 100px; background-image: url('photo.png'); background-position: -130px -80px; }
        
        /* 畫架 (未解鎖時一樣保持半透明) */
        #item6 { top: 20px; left: 500px; width: 170px; height: 579px; background-image: url('frame.png'); background-position: -510px -20px; cursor: not-allowed ; }

        @keyframes flashEffect { 0%, 100% { filter: drop-shadow(0 0 5px #f1c40f); } 50% { filter: drop-shadow(0 0 20px #f1c40f); } }
        .flashing { animation: flashEffect 1.5s infinite; cursor: pointer !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
            /* === 4. 文本佈局 === */
        .story-container { padding: 40px; height: 80%; overflow-y: auto; text-align: left; color: #ddd; line-height: 1.8; font-size: 16px; }
        .story-container h2 { text-align: center; color: var(--paper); border-bottom: 1px solid #554; padding-bottom: 10px; margin-bottom: 20px; }
        .paper-style { background: #eaddc5; color: #3e2723; padding: 20px; border: 1px solid #c8b79b; box-shadow: inset 0 0 20px rgba(0,0,0,0.1); font-family: 'Noto Serif TC', serif; margin-bottom: 20px;}
        button.action-btn { display: block; margin: 15px auto; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #5d4037; color: var(--paper); border: 1px solid var(--paper); transition: 0.3s; }
        button.action-btn:hover { background: var(--paper); color: #5d4037; }
        button.locked { opacity: 0.3; cursor: not-allowed; }

        /* === 5. 人物關係圖 (星狀拓撲) === */
        #relation-map-container { width: 100%; height: 450px; position: relative; background: #1a1a1a; border-radius: 5px; margin-top: 20px; overflow: hidden; border: 2px solid #5d4037; box-shadow: inset 0 0 30px black; }
        .char-node { position: absolute; width: 60px; height: 60px; border-radius: 50%; background-color: #3e2723; border: 3px solid #d4af37; display: flex; justify-content: center; align-items: center; text-align: center; color: white; font-size: 12px; font-weight: bold; line-height: 1.2; transform: translate(-50%, -50%); box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 2; transition: 0.5s; }
        .char-node.unknown { background-color: #222; border-color: #444; color: #666; font-size: 28px; font-family: serif; }
        .char-node.center-node { width: 80px; height: 80px; background-color: #e74c3c; border-color: white; font-size: 16px; z-index: 10; }
        .rel-label { position: absolute; background: var(--paper); color: var(--ink); padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; transform: translate(-50%, -50%); z-index: 5; border: 1px solid #8d6e63; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* === 6. 報紙填空遊戲 === */
        .newspaper-text { line-height: 2.2; font-size: 16px; color: #3e2723; }
        .blank-slot { display: inline-block; min-width: 60px; height: 24px; border-bottom: 2px solid #3e2723; margin: 0 5px; text-align: center; font-weight: bold; color: #e74c3c; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.05); }
        .blank-slot:hover { background: rgba(0,0,0,0.1); }
        .blank-slot.filled { border-bottom: none; background: transparent; }
        .word-bank { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #8d6e63; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .word-btn { padding: 8px 15px; background: #5d4037; color: var(--paper); border: 2px solid transparent; cursor: pointer; border-radius: 4px; font-size: 16px; transition: 0.3s; }
        .word-btn.selected { border-color: #f1c40f; background: #8d6e63; transform: scale(1.1); box-shadow: 0 0 10px rgba(241,196,15,0.5); }
        .word-btn.hidden { visibility: hidden; pointer-events: none; }

        /* === 7. 畫廊與尋找威力 === */
        /* 新增的畫廊輪播 CSS */
        .gallery-carousel { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 30px; }
        .nav-arrow { font-size: 40px; background: none; border: none; color: #d4af37; cursor: pointer; transition: 0.3s; padding: 10px; }
        .nav-arrow:hover { color: #f1c40f; transform: scale(1.2); }
        .nav-arrow:disabled { color: #555; cursor: not-allowed; transform: none; }

        /* === 7. 畫廊與尋找威力 === */
        .material-library { margin-top: 40px; border-top: 2px dashed #8d6e63; padding-top: 20px; text-align: center; }
        .material-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .material-slot { padding: 8px 12px; background: #1a1a1a; border: 1px solid #f1c40f; color: #f1c40f; font-size: 13px; border-radius: 4px; box-shadow: 0 0 5px rgba(241,196,15,0.3); }
        
        /* 尋寶畫布 (移除畫框後，我們給它一個適當的高度) */
        #wally-canvas { 
            width: 100%; height: 350px; 
            position: relative; 
            margin-top: 10px;
            transition: 0.3s;
        }
        /* === 修改：碰撞箱樣式 === */
        .wally-target { 
            position: absolute; 
            /* 💡 核心修改：將原本的黃色虛線改為 transparent (透明) */
            border: 2px dashed transparent; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 12px; 
            color: transparent; 
            transition: 0.3s;
            transform: translate(-50%, -50%); 
        }
        
        .wally-target.found { border-color: #2ecc71; background: rgba(46, 204, 113, 0.4); color: white; cursor: default; }
/* === 8. 終局拼圖 === */
        /* 【修改重點】：把寬高改為 250px 與 500px，呈現 1:2 的直幅長軸比例 */
        .puzzle-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 5px; width: 250px; height: 500px; margin: 20px auto; }
        
        .puzzle-piece { 
            /* ❗ 請準備一張名為 final.jpg 的原圖放在資料夾中 */
            background-image: url('final.png'); 
            /* 【修改重點】：改用 200% 200%，讓 CSS 自動計算 2x2 拼圖的縮放比例 */
            background-size: 200% 200%; 
            border: 1px solid #222; 
            cursor: pointer; 
            transition: 0.5s; 
            filter: grayscale(100%) blur(3px); 
        }
        
        .puzzle-piece.solved { 
            filter: grayscale(0%) blur(0px); 
            cursor: default; 
            box-shadow: 0 0 10px #d4af37;
            border-color: #d4af37;
        }
        
        .match-materials { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .match-btn { padding: 10px; background: #2c3e50; border: 1px solid #f1c40f; color: #f1c40f; cursor: pointer; }
        .match-btn.matched { background: #2ecc71; color: white; border-color: #2ecc71; pointer-events: none; }
        /* === 新增：最終關卡碎片與分類按鈕樣式 === */
        .category-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { padding: 8px 15px; background: #3e2723; color: #ccc; border: 1px solid #777; cursor: pointer; border-radius: 5px; font-size: 15px; transition: 0.3s; }
        .tab-btn:hover { background: #5d4037; color: white; }
        .tab-btn.active { background: #d4af37; color: #000; border-color: #f1c40f; font-weight: bold; transform: scale(1.05); }

        .fragment-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; min-height: 85px; }
        
        .fragment-slot { 
            width: 80px; height: 80px; 
            border: 2px solid #555; 
            cursor: pointer; 
            transition: 0.3s;
            background-size: cover;
            background-position: center;
        }
        .fragment-slot.selected { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241,196,15,0.8); transform: scale(1.1); }
        .fragment-slot.placed { opacity: 0.2; pointer-events: none; filter: grayscale(100%); }
        
        /* 💡 核心修改：將原本白色的虛線邊框改為 transparent (透明) */
        .final-target { 
            position: absolute; 
            border: 2px dashed transparent; 
            cursor: crosshair; 
            transform: translate(-50%, -50%); 
        }
        
        .final-target.matched { 
            border: 3px solid #f1c40f !important; /* 配對成功後的亮黃色實線邊框 */
            background: rgba(241, 196, 15, 0.3) !important; 
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.8); 
            cursor: default; 
        }
        /* === 9. 信封撕開互動特效 === */
        .envelope-container {
            position: relative;
            overflow: hidden; 
            border-radius: 5px;
            height: 350px;
            padding: 0 !important; /* 蓋掉紙張預設的內邊距，讓信封貼齊邊緣 */
        }
        .envelope-half {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            background: #d4c0a1; /* 復古牛皮紙色 */
            z-index: 10;
            transition: transform 1s ease-in-out, opacity 1s ease-in-out;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }
        .envelope-top {
            top: 0;
            align-items: flex-end;
            border-bottom: 3px dashed #a08059;
            cursor: grab;
            user-select: none;
            touch-action: pan-y;
        }
        .envelope-top:active { cursor: grabbing; }
        .envelope-bottom { bottom: 0; border-top: 1px solid #a08059; }
        
        /* === 刪除原本的 .tear-hint，替換為以下拆信刀樣式 === */
        
/* 拆信刀本體：移除自動動畫，改為受 JS 精準控制 */
        .letter-opener {
            position: absolute;
            bottom: -150px; 
            right: 0%; /* 起始點在最右邊 */
            width: 40px;
            height: auto;
            z-index: 12;
            pointer-events: none; /* 讓點擊事件能穿透到信封上 */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            transition: right 0.05s linear, transform 0.2s; /* 讓跟隨動作平滑 */
        }

        /* 新增：被割開的深色痕跡 */
        .cut-trail {
            position: absolute;
            bottom: -2px; /* 剛好蓋在虛線上 */
            right: 0;
            height: 4px;
            background: #2c1e14; /* 模擬信封內部深色的縫隙 */
            width: 0%; /* 起始長度 0，由 JS 動態拉長 */
            z-index: 11;
            border-radius: 2px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }
        
  .envelope-top {
            top: 0;
            align-items: flex-end;
            border-bottom: 3px dashed #a08059;
            z-index: 20; 
            /* 💡 讓滑鼠點擊可以穿透信封上半部，確保能精準抓到刀子 */
            pointer-events: none; 
        }
        
        .envelope-bottom { 
            bottom: 0; 
            border-top: 1px solid #a08059; 
            z-index: 10; 
            /* 💡 將抓取游標移到下半部 */
            cursor: grab; 
            user-select: none;
            touch-action: pan-y;
        }
        .envelope-bottom:active { cursor: grabbing; }
        
        /* 拆信刀本體 */
        /* 拆信刀本體 */
        .letter-opener {
            position: absolute;
            top: 50%;
            margin-top: -100px; 
            right: 0%; 
            width: 40px;
            height: auto;
            z-index: 15; 
            cursor: grab; 
            user-select: none;
            touch-action: pan-y;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            transform-origin: right bottom; 
            /* 💡 核心修復：移除了 right 的 transition，徹底解決跟隨滑鼠時的卡頓！ */
            transition: transform 0.2s, opacity 0.5s; 
        }
        .letter-opener:active { cursor: grabbing; }
        .letter-opener.torn { opacity: 0; }

        /* 💡 新增補回：信封撕開時上下飛走的特效，這樣才看得到裡面的信紙展開！ */
        .envelope-top.torn { transform: translateY(-100%); opacity: 0; }
        .envelope-bottom.torn { transform: translateY(100%); opacity: 0; }
        
        /* 1. 信紙本體 (藏在下方且被摺疊壓扁) */
        .letter-paper {
            position: absolute;
            top: 5%; 
            left: 5%;
            width: 90%;
            height: 90%;
            background: #eaddc5; 
            border: 1px solid #c8b79b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 5; 
            
            /* 往下移動 100% 藏在信封裡，並壓扁至 10% */
            transform: translateY(100%) scaleY(0.1);
            opacity: 0;
            
            /* 💡 核心修改：將變形基準點改為「正中心」，讓它上下同時攤開 */
            transform-origin: center center; 
            
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        /* 2. 抽出信件：回到正中央，但依然是壓扁的長方形 */
        .letter-paper.pulled {
            transform: translateY(0%) scaleY(0.1);
            opacity: 1;
        }

        /* 3. 攤開信件：將高度展開至 100% 原比例 */
        .letter-paper.unfolded {
            transform: translateY(0%) scaleY(1);
        }

        /* 4. 信件文字區塊 (預設隱藏，最後才浮現) */
        .letter-text-container {
            opacity: 0;
            transition: opacity 1s ease-in-out;
            padding: 20px;
            overflow-y: auto;
            height: 100%;
            box-sizing: border-box;
        }
        .letter-text-container.revealed { opacity: 1; }
        /* === 10. 展覽布幕動畫特效 === */
        #curtain-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9000; /* 確保布幕蓋在最上層 */
            display: none; 
            pointer-events: none; /* 避免擋住底下的滑鼠點擊 */
            overflow: hidden;
        }
        
        /* 左右布幕的共用設定 */
        .curtain-half {
            position: absolute;
            top: 0; 
            width: 50%; /* 佔據畫面一半寬度 */
            height: 100%; /* 填滿畫面高度 */
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); /* 平滑的加減速動畫 */
            box-shadow: 0 0 20px rgba(0,0,0,0.8); /* 讓布幕有浮在畫面上的立體陰影 */
            
            /* 【新增重點】：設定圖片顯示方式 */
            background-size: 100% 100%; /* 強制圖片拉伸填滿這個 50% 寬的容器 */
            background-repeat: no-repeat; /* 防止圖片重複拼貼 */
            background-position: center; /* 讓圖片置中對齊 */
        }
        
        /* 左半邊布幕：預設躲在左邊畫面外 */
        #curtain-left { 
            left: 0; 
            transform: translateX(-100%); 
            /* 載入左邊布幕圖片 */
            background-image: url('curtain-left1.png'); 
            
            /* (選擇性) 如果你的圖片邊緣已經很漂亮，這行金色飾邊可以刪除 */
            /* border-right: 3px solid #d4af37; */
        }
        
        /* 右半邊布幕：預設躲在右邊畫面外 */
        #curtain-right { 
            right: 0; 
            transform: translateX(100%); 
            /* 載入右邊布幕圖片 */
            background-image: url('curtain-right1.png'); 
            
            /* (選擇性) 如果你的圖片邊緣已經很漂亮，這行金色飾邊可以刪除 */
            /* border-left: 3px solid #d4af37; */
        }
        /* === 新增：日記紙張滑入動畫特效 === */
        @keyframes paperSlideIn {
            0% { 
                transform: translateY(-40px) rotate(-2deg); /* 從上方 40px 處開始，帶有輕微傾斜 */
                opacity: 0; 
            }
            100% { 
                transform: translateY(0) rotate(0deg); /* 回到正確位置與角度 */
                opacity: 1; 
            }
        }
        
        .slide-in-paper {
            /* 執行上面寫好的動畫：持續 0.8 秒，並使用平滑的減速效果 */
            animation: paperSlideIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            /* 延遲 0.4 秒才開始動畫，營造出「進場後才遞上紙張」的節奏感 */
            animation-delay: 0.4s; 
            opacity: 0; /* 動畫開始前保持隱藏 */
            position: relative;
            z-index: 10;
            /* 加上更明顯的陰影，讓它看起來真的像一張浮在畫布上的紙 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.6) !important; 
        }
        /* === 新增：逐行浮現動畫特效 === */
        @keyframes fadeInItem {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in-item {
            opacity: 0; /* 初始狀態為隱藏 */
            /* 執行 1.2 秒的浮現動畫，forwards 表示動畫結束後停留在最終狀態 */
            animation: fadeInItem 1.2s ease-out forwards; 
        }
        /* === 新增：純粹淡入動畫特效 (無位移) === */
        @keyframes pureFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        .pure-fade-in {
            opacity: 0; 
            animation: pureFadeIn 1.5s ease-in-out forwards; 
        }
        /* === 新增：音樂開關按鈕樣式 === */
        #audio-toggle {
            position: fixed;
            top: 20px;
            left: 20px; /* 💡 放在左上角，避免與右上角的計時器重疊 */
            background: rgba(44, 30, 20, 0.85);
            color: #f4e4bc;
            border: 2px solid #d4af37;
            border-radius: 5px;
            padding: 8px 12px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10000; /* 確保它永遠在最上層 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            transition: 0.3s;

const API_URL = "https://script.google.com/macros/s/AKfycbxbtIl8bYb8vy38SebQ92J8FHnP2F3I3fO-HZVdEzjRIrbtCRegSjoiCM7xK91PDNuw/exec";

const fetchOptions = { method: 'POST', redirect: 'follow', headers: { "Content-Type": "text/plain;charset=utf-8" } };

// === 💡 新增：自動存檔與讀檔系統 ===
function saveProgress() {
    // 遊戲還沒報到前不存檔
    if (!myName) return; 
    const dataToSave = {
        school: mySchool,
        className: myClass,
        studentName: myName,
        gameState: gameState // 存入目前的遊戲狀態
    };
    localStorage.setItem('nanjiSaveData', JSON.stringify(dataToSave));
}

function restoreUI() {
    // 1. 恢復舊玩具的狀態與信件計時器
    if (gameState.flags.childhoodRead) {
        document.getElementById('item1').classList.remove('flashing');
        if (gameState.flags.unlockedLetterCount < 4 && !gameState.letterTimer) {
            gameState.letterTimer = setInterval(() => {
                if (gameState.flags.unlockedLetterCount < 4) { 
                    gameState.flags.unlockedLetterCount++;
                    customAlert("書桌上似乎有新的信件或日記浮現了...");
                    if (document.getElementById('letter-list-container')) renderLetterList();
                } else {
                    clearInterval(gameState.letterTimer); 
                }
            }, 60000); // 1 分鐘
        }
    } else {
        document.getElementById('item1').classList.add('flashing');
    }

    // 2. 恢復信件堆狀態
    if (gameState.flags.lettersRead) {
        document.getElementById('item4').classList.remove('flashing');
    }

    // 3. 恢復報紙狀態 (有解鎖但還沒讀，就要閃爍)
    if ((gameState.flags.news1Unlocked && !gameState.flags.news1Read) || 
        (gameState.flags.news2Unlocked && !gameState.flags.news2Read) || 
        (gameState.flags.news3Unlocked && !gameState.flags.news3Read)) {
        document.getElementById('item2').classList.add('flashing');
    }

    // 4. 恢復畫布狀態
    if (gameState.flags.finalUnlocked) {
        const easel = document.getElementById('item6');
        easel.style.opacity = "1"; 
        easel.style.cursor = "pointer"; 
        easel.style.backgroundImage = "url('frame2.png')"; 
        easel.classList.add('flashing');
    }
}

// 網頁一載入，先檢查是否有存檔
window.addEventListener('load', async () => {
    
    // 💡 檢查是否有先前的遊戲進度
    const savedDataStr = localStorage.getItem('nanjiSaveData');
    if (savedDataStr) {
        const savedData = JSON.parse(savedDataStr);
        
        // 1. 還原基本資料
        mySchool = savedData.school;
        myClass = savedData.className;
        myName = savedData.studentName;
        
        // 2. 還原遊戲進度 (精準覆蓋)
        gameState.clearedLevels = savedData.gameState.clearedLevels;
        gameState.flags = savedData.gameState.flags;
        gameState.materials = savedData.gameState.materials;
        gameState.characters = savedData.gameState.characters;
        
        // 3. 隱藏登入與開場動畫，直接進入主房間
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('audio-toggle').style.display = 'block';
        document.getElementById('main-room').classList.add('active-scene');
        
        // 4. 還原閃爍提示與計時器
        restoreUI();
        if (localStorage.getItem('speedrunStartTime')) {
            startSpeedrunTimer();
        }
        
        // 5. 繼續啟動每 3 秒自動存檔
        setInterval(saveProgress, 3000);
        
        // 背景偷偷抓一下 API 喚醒它，不需要等結果
        fetch(API_URL, { ...fetchOptions, body: JSON.stringify({ action: 'getClasses' }) });
        return; // 直接結束，不跑後面的正常載入流程
    }

    // === 正常載入流程 (沒有存檔的新玩家) ===
    try {
        const response = await fetch(API_URL, { ...fetchOptions, body: JSON.stringify({ action: 'getClasses' }) });
        const result = await response.json();
        const selectEl = document.getElementById('class-select');
        selectEl.innerHTML = '<option value="">請選擇你的班級</option>';
        if (result.status === "success" && result.data.length > 0) {
            result.data.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.school + "|" + cls.className;
                option.text = cls.school + " - " + cls.className;
                selectEl.appendChild(option);
            });
        } else {
            selectEl.innerHTML = '<option value="">目前沒有開放的班級</option>';
        }
    } catch (e) {
        document.getElementById('class-select').innerHTML = '<option value="">網路連線異常</option>';
    }
});

// 學生點擊開始遊戲
async function studentJoinGame() {
    const classVal = document.getElementById('class-select').value;
    myName = document.getElementById('student-name').value.trim();
    const msg = document.getElementById('login-msg');

    if (!classVal || !myName) { msg.innerText = "請選擇班級並輸入姓名！"; return; }
    
    [mySchool, myClass] = classVal.split("|");
    msg.innerText = "報到中，請稍候...";
    msg.style.color = "#666";

    try {
        const response = await fetch(API_URL, { ...fetchOptions, body: JSON.stringify({ action: 'studentJoin', school: mySchool, className: myClass, studentName: myName }) });
        const result = await response.json();
        
        if (result.status === "success") {
            startSpeedrunTimer(); 
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex'; 
        } else {
            msg.innerText = result.message || "報到失敗";
        }
    } catch (e) {
        msg.innerText = "連線失敗，請檢查網路。";
    }
}

}

    const sfx = document.getElementById('page-sfx');
    if (sfx) {
        sfx.volume = SFX_VOLUME; 
        sfx.currentTime = 1; 
        sfx.play().catch(e => console.log("音效播放被瀏覽器阻擋:", e));
    }
}

let speedrunStartTime = 0;
let speedrunInterval = null;

function startSpeedrunTimer() {
    document.getElementById('speedrun-timer').style.display = 'block';
    
    // 如果有舊的計時紀錄就延續，沒有就產生新的
    const savedTime = localStorage.getItem('speedrunStartTime');
    if (savedTime) {
        speedrunStartTime = parseInt(savedTime, 10);
    } else {
        speedrunStartTime = Date.now(); 
        localStorage.setItem('speedrunStartTime', speedrunStartTime.toString());
    }
    
    if (!speedrunInterval) {
        speedrunInterval = setInterval(updateTimer, 1000); 
    }
}

function updateTimer() {
    const now = Date.now();
    const diffInSeconds = Math.floor((now - speedrunStartTime) / 1000); 
    const minutes = String(Math.floor(diffInSeconds / 60)).padStart(2, '0');
    const seconds = String(diffInSeconds % 60).padStart(2, '0');
    document.getElementById('speedrun-timer').innerText = `${minutes}:${seconds}`;
}

function stopSpeedrunTimer() {
    clearInterval(speedrunInterval); 
    speedrunInterval = null; 
    return document.getElementById('speedrun-timer').innerText; 
}

function renderRelations() {
    const nodesContainer = document.getElementById('nodes-container');
    const svg = document.getElementById('svg-lines');
    const centerX = 360, centerY = 225, radius = 140;

    const centerNode = document.createElement('div');
    centerNode.className = 'char-node center-node';
    centerNode.style.left = centerX + 'px'; centerNode.style.top = centerY + 'px';
    centerNode.innerText = "我\n(?)"; 
    nodesContainer.appendChild(centerNode);

    const chars = Object.values(gameState.characters);
    const angleStep = (2 * Math.PI) / chars.length;

    chars.forEach((char, index) => {
        const angle = index * angleStep;
        const nodeX = centerX + radius * Math.cos(angle);
        const nodeY = centerY + radius * Math.sin(angle);

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", centerX); line.setAttribute("y1", centerY);
        line.setAttribute("x2", nodeX); line.setAttribute("y2", nodeY);
        line.setAttribute("stroke", char.unlocked ? "#d4af37" : "#444"); 
        line.setAttribute("stroke-width", char.unlocked ? "3" : "1");
        line.setAttribute("stroke-dasharray", char.unlocked ? "0" : "5,5"); 
        svg.appendChild(line);

        const midX = (centerX + nodeX) / 2;
        const midY = (centerY + nodeY) / 2;
        const label = document.createElement('div');
        label.className = 'rel-label';
        label.style.left = midX + 'px'; label.style.top = midY + 'px';
        label.innerText = char.unlocked ? char.relation : "???"; 
        if (!char.unlocked) { label.style.background = "#333"; label.style.color = "#888"; }
        nodesContainer.appendChild(label);

        const node = document.createElement('div');
        if (char.unlocked) { node.className = 'char-node'; node.innerText = char.name; } 
        else { node.className = 'char-node unknown'; node.innerText = "?"; }
        node.style.left = nodeX + 'px'; node.style.top = nodeY + 'px';
        nodesContainer.appendChild(node);
    });
}

function selectWord(btn) {
    document.querySelectorAll('.word-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected'); 
    selectedWordObj = btn; 
}

function fillSlot(slot) {
    if (slot.innerText !== "___") {
        returnWord(slot);
        return;
    }
    if (selectedWordObj) {
        slot.innerText = selectedWordObj.innerText;
        slot.classList.add('filled');
        selectedWordObj.classList.add('hidden'); 
        slot.setAttribute('data-word-id', selectedWordObj.id); 
        selectedWordObj = null;
        checkPuzzleCompletion();
    }
}

function returnWord(slot) {
    if (slot.innerText === "___") return;
    const wordId = slot.getAttribute('data-word-id');
    const wordEl = document.getElementById(wordId);
    if (wordEl) wordEl.classList.remove('hidden');
    
    slot.innerText = "___";
    slot.classList.remove('filled');
    slot.removeAttribute('data-word-id');
}

function checkPuzzleCompletion() {
    let allFilled = true; let allCorrect = true;
    document.querySelectorAll('.blank-slot').forEach(slot => {
        if (slot.innerText === "___") { allFilled = false; } 
        else {
            const validAnswers = slot.getAttribute('data-answer').split(',');
            if (!validAnswers.includes(slot.innerText)) { allCorrect = false; }
        }
    });
    
    if (allFilled) {
        setTimeout(() => {
            if (allCorrect) {
                customAlert("解讀正確！你精準理解了當時的評論。");
                if (currentNewsLevel === 1) gameState.flags.news1Read = true;
                if (currentNewsLevel === 2) gameState.flags.news2Read = true;
                if (currentNewsLevel === 3) gameState.flags.news3Read = true;
                returnToRoom();
            } else {
                customAlert("理解有誤...請點擊填好的詞彙將其移除，重新選擇再試一次。");
            }
        }, 300);
    }
}

function findTarget(exKey, pIndex, tIndex = 0) {
    const p = exhibitions[exKey].paintings[pIndex];
    const t = p.targets[tIndex]; 

    if (!t.found) {
        t.found = true; 
        if (exKey === 'taiten1' && pIndex === 0) {
            enterPainting(exKey, pIndex);
        } else {
            if (!gameState.materials.includes(t.target)) { gameState.materials.push(t.target); }
            enterPainting(exKey, pIndex); 
        }
        
        const isExhibitionCleared = exhibitions[exKey].paintings.every(pt => pt.targets.every(tgt => tgt.found));

        if (isExhibitionCleared && !gameState.clearedLevels[exKey]) {
            gameState.clearedLevels[exKey] = true;
            if (exKey === 'taiten1') {
                gameState.characters['lin'].unlocked = true; 
                gameState.characters['chen'].unlocked = true;
            }
            setTimeout(() => { customAlert(`恭喜！${exhibitions[exKey].title} 探索完畢！\n(人物關係圖已更新)`); returnToRoom(); }, 500);
        }
    }
}

let activeDragId = null;
let dragEl = null;
let dragStartX = 0, dragStartY = 0;
let dragStartLeft = 0, dragStartTop = 0;

function startDragWeight(e, id) {
    e.preventDefault();
    if (e.button !== 0 && e.type.includes('mouse')) return;
    
    // 💡 關鍵修復：防殘影安全鎖！
    if (dragEl) {
        dragEl.remove();
        dragEl = null;
        document.removeEventListener('pointermove', onDragWeightMove);
        document.removeEventListener('pointerup', onDragWeightEnd);
        document.removeEventListener('pointercancel', onDragWeightEnd);
        if (activeDragId) {
            let oldEl = document.getElementById(`weight-${activeDragId}`);
            if (oldEl) oldEl.style.opacity = '1';
        }
    }
    
    activeDragId = id;
    const originalEl = document.getElementById(`weight-${id}`);
    const rect = originalEl.getBoundingClientRect();
    
    dragEl = originalEl.cloneNode(true);
    dragEl.style.position = 'fixed';
    dragEl.style.left = rect.left + 'px';
    dragEl.style.top = rect.top + 'px';
    dragEl.style.width = rect.width + 'px';
    dragEl.style.zIndex = 10000;
    dragEl.style.pointerEvents = 'none'; 
    dragEl.style.opacity = '0.9';
    dragEl.style.transform = 'scale(1.05)';
    dragEl.style.cursor = 'grabbing';
    document.body.appendChild(dragEl);
    
    originalEl.style.opacity = '0.3'; 
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
    
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragStartLeft = rect.left;
    dragStartTop = rect.top;
    
    document.addEventListener('pointermove', onDragWeightMove);
    document.addEventListener('pointerup', onDragWeightEnd);
    document.addEventListener('pointercancel', onDragWeightEnd);
}

function onDragWeightMove(e) {
    if (!dragEl) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    dragEl.style.left = (dragStartLeft + dx) + 'px';
    dragEl.style.top = (dragStartTop + dy) + 'px';
}

function onDragWeightEnd(e) {
    if (!dragEl) return;
    
    document.removeEventListener('pointermove', onDragWeightMove);
    document.removeEventListener('pointerup', onDragWeightEnd);
    document.removeEventListener('pointercancel', onDragWeightEnd);
    
    const elemBelow = document.elementFromPoint(e.clientX, e.clientY);
    let dropZone = elemBelow ? elemBelow.closest('.drop-zone') : null;
    
    let currentLoc = scaleState.left.includes(activeDragId) ? 'left' : (scaleState.right.includes(activeDragId) ? 'right' : 'pool');
    let target = currentLoc; 
    
    if (dropZone) {
        if (dropZone.id === 'pan-left-wrapper') target = 'left';
        else if (dropZone.id === 'pan-right-wrapper') target = 'right';
        else if (dropZone.id === 'pool-zone') target = 'pool';
    }
    
    dragEl.remove();
    dragEl = null;
    
    assignWeight(activeDragId, target);
    activeDragId = null;
    
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
}

function assignWeight(id, target) {
    scaleState.pool = scaleState.pool.filter(w => w !== id);
    scaleState.left = scaleState.left.filter(w => w !== id);
    scaleState.right = scaleState.right.filter(w => w !== id);

    if (target === 'left') scaleState.left.push(id);
    else if (target === 'right') scaleState.right.push(id);
    else scaleState.pool.push(id);

    updateScaleUI();
}

function updateScaleUI() {
    document.getElementById('weight-pool').innerHTML = scaleState.pool.map(id => createWeightHTML(id)).join('');
    document.getElementById('pan-left').innerHTML = scaleState.left.map(id => createWeightHTML(id)).join('');
    document.getElementById('pan-right').innerHTML = scaleState.right.map(id => createWeightHTML(id)).join('');
    
    let tilt = (scaleState.right.length - scaleState.left.length) * 8;
    
    if (tilt > 15) tilt = 15;
    if (tilt < -5) tilt = -5;
    
    document.getElementById('scale-beam').style.transform = `translateX(-50%) rotate(${tilt}deg)`;
    document.getElementById('pan-left-wrapper').style.transform = `translateX(-50%) rotate(${-tilt}deg)`;
    document.getElementById('pan-right-wrapper').style.transform = `translateX(50%) rotate(${-tilt}deg)`;
    
    if (scaleState.left.length + scaleState.right.length === 6) {
        setTimeout(() => {
            if (scaleState.left.length === 3 && scaleState.right.length === 3) {
                let leftCorrect = scaleState.left.every(w => scaleData[w].correct === 'left');

    }
}

    document.getElementById('waiting-screen').style.display = 'flex';
    document.getElementById('main-room').style.display = 'none';
    document.getElementById('sub-level').style.display = 'none';

    pollEndGameStatus();
}

function pollEndGameStatus() {
    const interval = setInterval(async () => {
        try {
            const response = await fetch(API_URL, { ...fetchOptions, body: JSON.stringify({ action: 'checkEnd', school: mySchool, className: myClass, studentName: myName }) });
            const result = await response.json();
            
            if (result.isEnded) {
                clearInterval(interval); 
                
                const waitingBox = document.getElementById('waiting-box');
                document.getElementById('waiting-spinner').style.display = 'none';
                document.getElementById('waiting-title').innerText = "結算完成！";
                
                if (result.myStatus === "成功") {
                    document.getElementById('waiting-text').innerHTML = `
                        <h1 style="color: #2ecc71;">通關成功</h1>
                        <p style="font-size:24px; font-weight:bold;">恭喜！你是全班第 <span style="color:#d4af37; font-size:36px;">${result.rank}</span> 名解開謎團的探險家！</p>
                        <p>南街殷賑的風華因你而重現。</p>
                    `;
                } else {
                    document.getElementById('waiting-text').innerHTML = `
                        <h1 style="color: #e74c3c;">落款錯誤</h1>
                        <p style="font-size:20px;">歷史的記憶模糊了...</p>
                        <p style="font-size:24px; font-weight:bold; margin-top:20px;">這幅畫真正的主人是：<span style="color:#d4af37;">${result.correctAnswer}</span></p>
                    `;
                }
            }
        } catch(e) { console.log("檢查狀態中..."); }
    }, 5000); 
}

function checkRoomState() {
    if (gameState.clearedLevels.taiten1 && !gameState.flags.news1Unlocked) { gameState.flags.news1Unlocked = true; document.getElementById('item2').classList.add('flashing'); }
    if (gameState.clearedLevels.taiten2 && !gameState.flags.news2Unlocked) { gameState.flags.news2Unlocked = true; document.getElementById('item2').classList.add('flashing'); }
    if (gameState.clearedLevels.taiten3 && !gameState.flags.news3Unlocked) { gameState.flags.news3Unlocked = true; document.getElementById('item2').classList.add('flashing'); }
    
    const allNewsRead = gameState.flags.news1Read && gameState.flags.news2Read && gameState.flags.news3Read;
    const allLettersRead = gameState.flags.teacherRead && gameState.flags.dropoutRead && gameState.flags.diary1Read && gameState.flags.diary2Read;

    if (gameState.clearedLevels.taiten3 && gameState.materials.length >= 4 && allNewsRead && allLettersRead && !gameState.flags.finalUnlocked) {
        gameState.flags.finalUnlocked = true;
        const easel = document.getElementById('item6');
        easel.style.opacity = "1"; 
        easel.style.cursor = "pointer"; 
        easel.style.backgroundImage = "url('frame2.png')"; 
        easel.classList.add('flashing');
    }
}

let isCutting = false; let cutProgress = 0; let startMouseX = 0; let hasTorn = false; 

function startCutting(e) {
    if (hasTorn || cutProgress >= 85) return;  
    isCutting = true;
    startMouseX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
    let opener = document.getElementById('letter-opener');
    if (opener) opener.style.transform = "rotate(-15deg)";
}

function sawCutting(e) {
    if (!isCutting || hasTorn) return;
    if (e.type.includes('touch') && e.cancelable) e.preventDefault(); 
    
    requestAnimationFrame(() => {
        let currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        let totalDistance = startMouseX - currentX;

        if (totalDistance > 0) {
            cutProgress = (totalDistance / 200) * 100; 
            if (cutProgress > 100) cutProgress = 100;
            
            document.getElementById('cut-trail').style.width = cutProgress + '%';
            document.getElementById('letter-opener').style.right = cutProgress + '%';

            if (cutProgress >= 85 && !hasTorn) {
                hasTorn = true; 
                isCutting = false;
                cutProgress = 100;
                document.getElementById('cut-trail').style.width = '100%';
                document.getElementById('letter-opener').style.right = '100%';
                let opener = document.getElementById('letter-opener');
                if (opener) opener.style.transform = "rotate(0deg)";
                tearEnvelope(); 
            }
        }
    });
}

function stopCutting() {
    if (hasTorn) return;
    isCutting = false;
    let opener = document.getElementById('letter-opener');
    if (opener) opener.style.transform = "rotate(0deg)";
}

function tearEnvelope() {
    document.getElementById('env-top').classList.add('torn');
    document.getElementById('env-bottom').classList.add('torn');
    setTimeout(() => { const opener = document.getElementById('letter-opener'); if (opener) opener.classList.add('torn'); }, 400); 
    setTimeout(() => { document.getElementById('letter-paper').classList.add('pulled'); }, 800);
    setTimeout(() => { document.getElementById('letter-paper').classList.add('unfolded'); }, 1600);
    setTimeout(() => {
        document.getElementById('letter-content').classList.add('revealed');
        document.getElementById('env-top').style.display = 'none';
        document.getElementById('env-bottom').style.display = 'none';
        const opener = document.getElementById('letter-opener');
        if (opener) opener.style.display = 'none'; 
    }, 2400);
}
    
function openWithCurtain(exKey) {
    const curtain = document.getElementById('curtain-container');
    const leftCurtain = document.getElementById('curtain-left');
    const rightCurtain = document.getElementById('curtain-right');
    
    curtain.style.display = 'block';
    curtain.offsetHeight; 
    leftCurtain.style.transform = 'translateX(0%)';
    rightCurtain.style.transform = 'translateX(0%)';
    
    setTimeout(() => {
        enterPainting(exKey, 0);
        leftCurtain.style.transform = 'translateX(-100%)';
        rightCurtain.style.transform = 'translateX(100%)';
        setTimeout(() => { curtain.style.display = 'none'; }, 1200);
    }, 1200); 
}
